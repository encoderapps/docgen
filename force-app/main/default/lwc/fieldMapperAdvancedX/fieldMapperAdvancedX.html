<template>
    <lightning-card>

        <!-- ================= HEADER ================= -->
        <div class="header">
            <div class="title">Field Selection Configuration</div>

            <div class="actions">
                <lightning-button
                    label="Save"
                    variant="brand"
                    onclick={handleSave}>
                </lightning-button>

                <lightning-button
                    label="Cancel"
                    variant="neutral"
                    class="slds-m-left_small"
                    onclick={handleCancel}>
                </lightning-button>
            </div>
        </div>

        <div class="divider"></div>

        <!-- ================= SOURCE OBJECT ================= -->
        <div class="source-object">
            <span>Source Object:</span>

            <lightning-combobox
                class="object-dropdown"
                value={selectedObject}
                options={objectOptions}
                onchange={handleObjectChange}>
            </lightning-combobox>
        </div>

        <div class="divider"></div>

        <!-- ================= MAIN BODY ================= -->
        <div class="main-container">

            <!-- ================= LEFT PANEL ================= -->
            <div class="left-panel">

                <h3>Source Fields</h3>

                <lightning-input
                    type="search"
                    placeholder="Search Fields..."
                    onchange={handleSearch}>
                </lightning-input>

                <!-- STANDARD -->
                <div class="section-header" onclick={toggleStandard}>
                    {standardIcon} Standard Fields
                </div>

                <template if:true={isStandardOpen}>
                    <div class="scroll-container">
                        <template for:each={visibleStandardFields} for:item="field">
                            <div
                                key={field.apiName}
                                class="field-item"
                                draggable="true"
                                data-api={field.apiName}
                                ondragstart={handleDrag}>
                                {field.label}
                            </div>
                        </template>
                    </div>
                </template>

                <!-- CUSTOM -->
                <div class="section-header" onclick={toggleCustom}>
                    {customIcon} Custom Fields
                </div>

                <template if:true={isCustomOpen}>
                    <div class="scroll-container">
                        <template for:each={visibleCustomFields} for:item="field">
                            <div
                                key={field.apiName}
                                class="field-item"
                                draggable="true"
                                data-api={field.apiName}
                                ondragstart={handleDrag}>
                                {field.label}
                            </div>
                        </template>
                    </div>
                </template>

                <!-- LOOKUP -->
                <div class="section-header" onclick={toggleLookup}>
                    {lookupIcon} Lookup Fields
                </div>

                <template if:true={isLookupOpen}>
                    <div class="scroll-container">
                        <template for:each={visibleLookupFields} for:item="field">
                            <div
                                key={field.apiName}
                                class="field-item"
                                draggable="true"
                                data-api={field.apiName}
                                ondragstart={handleDrag}>
                                {field.label}
                            </div>
                        </template>
                    </div>
                </template>

                <!-- RELATED OBJECTS SECTION-->
                <div class="section-header" onclick={toggleRelated}>
                    {relatedIcon} Related Objects
                </div>

                <template if:true={isRelatedOpen}>
                    <template for:each={relatedData} for:item="rel">

                        <div
                            key={rel.name}
                            class="section-header"
                            data-obj={rel.name}
                            onclick={handleRelatedClick}>
                            ► {rel.name}
                        </div>

                        <template if:true={rel.isOpen}>
                            <template for:each={rel.fields} for:item="field">
                                <div
                                    key={field.apiName}
                                    class="field-item"
                                    draggable="true"
                                    data-api={field.apiName}
                                    data-parent={rel.name}
                                    ondragstart={handleDrag}>
                                    {field.label}
                                </div>
                            </template>
                        </template>

                    </template>
                </template>

            </div>

            <!-- ================= RIGHT PANEL ================= -->
            <div
                class="right-panel"
                ondragover={allowDrop}
                ondrop={handleDrop}>

                <h3>Mapping Canvas</h3>

                <template for:each={mappedFields} for:item="field">
                    <div
                        key={field.uniqueKey}
                        class="mapped-item">

                        <span>
                            <template if:true={field.parentObject}>
                                {field.parentObject}.
                            </template>
                            {field.label}
                        </span>

                        <lightning-button-icon
                            icon-name="utility:delete"
                            data-key={field.uniqueKey}
                            onclick={handleDelete}>
                        </lightning-button-icon>
                    </div>
                </template>

                <!-- GENERATE JSON BUTTON -->
                <div class="json-section">
                    <lightning-button
                        label="Generate JSON"
                        variant="brand"
                        onclick={generateJSON}>
                    </lightning-button>
                </div>

                <!-- JSON OUTPUT -->
                <template if:true={generatedJSON}>
                    <div class="json-box">
                        <pre>{generatedJSON}</pre>
                    </div>
                </template>

            </div>

        </div>

    </lightning-card>
</template>
