<template>
    <lightning-card title="Template Output Generator">
        <div class="slds-m-around_medium">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Generating..." size="small"></lightning-spinner>
            </template>
        
            <lightning-button
                label="Generate Output HTML"
                variant="brand"
                onclick={handleClick}
                disabled={isLoading}>
            </lightning-button>
        </div>
    </lightning-card>
</template>
