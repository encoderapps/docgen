<template>

    <template if:true={isOpen}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <header class="slds-modal__header">

                    <button class="slds-button slds-button_icon slds-modal__close"
                            onclick={closeModal}>
                        <lightning-icon icon-name="utility:close"
                                        alternative-text="close"
                                        size="small">
                        </lightning-icon>
                    </button>

                    <h2 class="slds-text-heading_large slds-text-title_bold">
                        Generate HTML Document
                    </h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <lightning-record-edit-form object-api-name="Template_Mapping_Output__c">

                        <lightning-input-field field-name="Account__c"></lightning-input-field>

                        <lightning-input-field field-name="Template_Id__c"></lightning-input-field>

                        <lightning-input-field field-name="Field_Mapping__c"></lightning-input-field>

                    </lightning-record-edit-form>

                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                    <lightning-button label="Generate HTML"
                                      variant="brand"
                                      onclick={generateHTML}>
                    </lightning-button>
                </footer>

            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
